<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Duelo offline</title>
    <meta name="theme-color" content="#071018" />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #071018;
        color: #f8fafc;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 32px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 9vw, 56px);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        font-size: 18px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Duelo offline</h1>
      <p>
        A arena precisa de conexão para buscar novas imagens e registrar votos.
        Reabra quando a internet voltar.
      </p>
    </main>
  </body>
</html>
