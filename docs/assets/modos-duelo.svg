<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="520" rx="24" fill="#071018"/>
  <text x="70" y="88" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900">Modos de jogo</text>
  <text x="72" y="124" fill="#A8B3C7" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">O mesmo motor de duelo pode ser filtrado por nicho, combinação ou aleatoriedade total.</text>

  <rect x="70" y="174" width="320" height="250" rx="18" fill="#0F172A" stroke="#38BDF8"/>
  <circle cx="118" cy="226" r="26" fill="#22D3EE"/>
  <text x="109" y="236" fill="#071018" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">1</text>
  <text x="156" y="236" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">Categoria</text>
  <text x="102" y="290" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Um único nicho por vez:</text>
  <text x="102" y="326" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900">Carros</text>
  <text x="102" y="358" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900">Aves</text>
  <text x="102" y="390" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900">Relógios</text>

  <rect x="440" y="174" width="320" height="250" rx="18" fill="#0F172A" stroke="#FBBF24"/>
  <circle cx="488" cy="226" r="26" fill="#FBBF24"/>
  <text x="479" y="236" fill="#071018" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">2</text>
  <text x="526" y="236" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">Mix</text>
  <text x="472" y="290" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">O usuário escolhe grupos:</text>
  <rect x="472" y="316" width="92" height="34" rx="8" fill="#1E293B"/>
  <text x="490" y="340" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="900">Carros</text>
  <rect x="576" y="316" width="104" height="34" rx="8" fill="#1E293B"/>
  <text x="594" y="340" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="900">Árvores</text>
  <rect x="472" y="362" width="82" height="34" rx="8" fill="#1E293B"/>
  <text x="490" y="386" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="900">Motos</text>

  <rect x="810" y="174" width="320" height="250" rx="18" fill="#0F172A" stroke="#22C55E"/>
  <circle cx="858" cy="226" r="26" fill="#22C55E"/>
  <text x="849" y="236" fill="#071018" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">3</text>
  <text x="896" y="236" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">Caos</text>
  <text x="842" y="290" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Totalmente aleatório:</text>
  <text x="842" y="326" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900">Gato + espaco</text>
  <text x="842" y="358" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900">Flor + faca</text>
  <text x="842" y="390" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900">Roupa + cidade</text>
</svg>
